<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miranda Weather</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
width: 100%;
background: transparent;
font-family: ‘DM Sans’, sans-serif;
display: flex;
align-items: flex-start;
justify-content: flex-start;
}

@media (prefers-color-scheme: light) {
.card {
background: rgba(255,255,255,0.55);
border: 1px solid rgba(244,114,182,0.25);
box-shadow: 0 2px 16px rgba(236,72,153,0.08);
}
.city        { color: #db2777; }
.sub         { color: #f472b6; }
.cur-temp    { color: #db2777; }
.cur-cond    { color: #ec4899; }
.divider     { background: rgba(244,114,182,0.2); }
.day-name    { color: #f9a8d4; }
.day-high    { color: #db2777; }
.day-low     { color: #f9a8d4; }
.day-col     { border-right: 1px solid rgba(244,114,182,0.15); }
.status      { color: #f472b6; }
}

@media (prefers-color-scheme: dark) {
.card {
background: rgba(255,255,255,0.06);
border: 1px solid rgba(244,114,182,0.18);
box-shadow: 0 2px 16px rgba(0,0,0,0.2);
}
.city        { color: #f9a8d4; }
.sub         { color: #9d174d; }
.cur-temp    { color: #f472b6; }
.cur-cond    { color: #f9a8d4; }
.divider     { background: rgba(244,114,182,0.12); }
.day-name    { color: #9d174d; }
.day-high    { color: #f472b6; }
.day-low     { color: #9d174d; }
.day-col     { border-right: 1px solid rgba(244,114,182,0.1); }
.status      { color: #f472b6; }
}

.card {
width: 100%;
padding: clamp(14px, 2.5vw, 22px) clamp(20px, 4vw, 40px);
border-radius: 18px;
backdrop-filter: blur(16px);
-webkit-backdrop-filter: blur(16px);
animation: fadeUp 0.7s cubic-bezier(.22,1,.36,1) both;
}

@keyframes fadeUp {
from { opacity: 0; transform: translateY(12px); }
to   { opacity: 1; transform: translateY(0); }
}

/* TOP SECTION */
.top {
display: flex;
align-items: center;
justify-content: space-between;
flex-wrap: wrap;
gap: 8px 16px;
margin-bottom: 14px;
}

.top-left { display: flex; flex-direction: column; }

.city {
font-size: clamp(0.9rem, 2.5vw, 1.1rem);
font-weight: 500;
}

.sub {
font-size: clamp(0.7rem, 1.8vw, 0.85rem);
font-weight: 300;
margin-top: 1px;
}

.top-center {
font-size: clamp(2rem, 6vw, 2.8rem);
flex-shrink: 0;
animation: pulse 4s ease-in-out infinite;
}

@keyframes pulse {
0%, 100% { transform: scale(1); }
50%       { transform: scale(1.1); }
}

.top-right { text-align: right; }

.cur-temp {
font-size: clamp(1.6rem, 5vw, 2.4rem);
font-weight: 500;
letter-spacing: -0.02em;
line-height: 1;
}

.cur-cond {
font-size: clamp(0.7rem, 1.8vw, 0.85rem);
font-weight: 300;
margin-top: 3px;
max-width: 120px;
line-height: 1.3;
}

/* DIVIDER */
.divider {
height: 1px;
width: 100%;
margin: 10px 0;
border-radius: 2px;
}

/* FORECAST ROW */
.forecast {
display: flex;
width: 100%;
}

.day-col {
flex: 1;
display: flex;
flex-direction: column;
align-items: center;
gap: 5px;
padding: 8px 4px;
text-align: center;
}

.day-col:last-child { border-right: none !important; }

.day-name {
font-size: clamp(0.6rem, 1.6vw, 0.75rem);
font-weight: 400;
text-transform: uppercase;
letter-spacing: 0.05em;
}

.day-emoji {
font-size: clamp(1.1rem, 3vw, 1.5rem);
}

.day-high {
font-size: clamp(0.75rem, 2vw, 0.9rem);
font-weight: 500;
}

.day-low {
font-size: clamp(0.65rem, 1.7vw, 0.8rem);
font-weight: 300;
}

.status {
font-size: 0.9rem;
font-weight: 300;
}
</style>

</head>
<body>
<div class="card" id="card">
  <div class="status" id="status">📍 Detecting location...</div>
</div>

<script>
  const WX = {
    0:  ['☀️','Clear'],          1: ['🌤️','Mostly clear'],
    2:  ['⛅','Partly cloudy'],   3: ['☁️','Overcast'],
    45: ['🌫️','Foggy'],         48: ['🌫️','Icy fog'],
    51: ['🌦️','Drizzle'],       53: ['🌦️','Drizzle'],      55: ['🌧️','Heavy drizzle'],
    61: ['🌧️','Light rain'],    63: ['🌧️','Rain'],          65: ['🌧️','Heavy rain'],
    71: ['🌨️','Light snow'],    73: ['🌨️','Snow'],          75: ['❄️','Heavy snow'],
    80: ['🌦️','Showers'],       81: ['🌧️','Showers'],       82: ['⛈️','Heavy showers'],
    95: ['⛈️','Thunderstorm'],  99: ['⛈️','Thunderstorm'],
  };

  const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  async function load(lat, lon) {
    try {
      const [geoRes, wxRes] = await Promise.all([
        fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`),
        fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`
          + `&current=temperature_2m,weather_code`
          + `&daily=weather_code,temperature_2m_max,temperature_2m_min`
          + `&temperature_unit=celsius&timezone=auto&forecast_days=7`)
      ]);

      const geo = await geoRes.json();
      const wx  = await wxRes.json();

      const city = geo.address.city || geo.address.town || geo.address.village || geo.address.county || 'Your location';
      const curTemp = Math.round(wx.current.temperature_2m);
      const [curEmoji, curCond] = WX[wx.current.weather_code] || ['🌡️','Unknown'];

      const dailyCols = wx.daily.time.map((dateStr, i) => {
        const d     = new Date(dateStr + 'T12:00:00');
        const name  = DAYS[d.getDay()];
        const [emoji] = WX[wx.daily.weather_code[i]] || ['🌡️'];
        const hi    = Math.round(wx.daily.temperature_2m_max[i]);
        const lo    = Math.round(wx.daily.temperature_2m_min[i]);
        return `
          <div class="day-col">
            <span class="day-name">${name}</span>
            <span class="day-emoji">${emoji}</span>
            <span class="day-high">${hi}°</span>
            <span class="day-low">${lo}°</span>
          </div>`;
      }).join('');

      document.getElementById('card').innerHTML = `
        <div class="top">
          <div class="top-left">
            <span class="city">📍 ${city}</span>
            <span class="sub">weather</span>
          </div>
          <div class="top-center">${curEmoji}</div>
          <div class="top-right">
            <div class="cur-temp">${curTemp}°C</div>
            <div class="cur-cond">${curCond}</div>
          </div>
        </div>
        <div class="divider"></div>
        <div class="forecast">${dailyCols}</div>
      `;
    } catch(e) {
      document.getElementById('status').textContent = '⚠️ Could not load weather.';
    }
  }

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      p => load(p.coords.latitude, p.coords.longitude),
      () => { document.getElementById('status').textContent = '📍 Enable location to see weather.'; }
    );
  } else {
    document.getElementById('status').textContent = '📍 Geolocation not supported.';
  }
</script>

</body>
</html>
