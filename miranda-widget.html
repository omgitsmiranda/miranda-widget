<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hello Miranda</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
  }

  /* ── LIGHT MODE ── */
  @media (prefers-color-scheme: light) {
    body { background: #fdf2f8; }
    .blob-1 { background: radial-gradient(circle, #f9a8d4 0%, transparent 70%); }
    .blob-2 { background: radial-gradient(circle, #fbcfe8 0%, transparent 70%); }
    .card {
      background: rgba(255,255,255,0.6);
      border: 1px solid rgba(244,114,182,0.2);
      box-shadow: 0 4px 32px rgba(236,72,153,0.08);
    }
    .greeting { color: #ec4899; }
    .meta     { color: #db2777; }
    .dot      { color: #f9a8d4; }
  }

  /* ── DARK MODE ── */
  @media (prefers-color-scheme: dark) {
    body { background: #1a0a14; }
    .blob-1 { background: radial-gradient(circle, #9d174d55 0%, transparent 70%); }
    .blob-2 { background: radial-gradient(circle, #be185d33 0%, transparent 70%); }
    .card {
      background: rgba(30,10,22,0.65);
      border: 1px solid rgba(244,114,182,0.15);
      box-shadow: 0 4px 32px rgba(0,0,0,0.4);
    }
    .greeting { color: #f9a8d4; }
    .meta     { color: #f472b6; }
    .dot      { color: #db2777; }
  }

  /* ── BLOBS ── */
  .blob {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
    animation: drift linear infinite;
  }
  .blob-1 { width: 50vw; height: 50vw; top: -15vw; left: -10vw; animation-duration: 20s; }
  .blob-2 { width: 35vw; height: 35vw; bottom: -10vw; right: -5vw; animation-duration: 25s; animation-delay: -8s; }

  @keyframes drift {
    0%   { transform: translate(0,0) scale(1); }
    33%  { transform: translate(20px,-15px) scale(1.04); }
    66%  { transform: translate(-15px,15px) scale(0.97); }
    100% { transform: translate(0,0) scale(1); }
  }

  /* ── LAYOUT ── */
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .card {
    position: relative;
    z-index: 1;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 20px;
    padding: clamp(16px, 3vw, 28px) clamp(24px, 5vw, 48px);
    width: 100%;
    max-width: 900px;
    animation: fadeUp 0.8s cubic-bezier(.22,1,.36,1) both;
    display: flex;
    align-items: center;
    gap: clamp(12px, 3vw, 28px);
    flex-wrap: wrap;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── EMOJI ── */
  .emoji {
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    flex-shrink: 0;
    animation: pulse 4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50%       { transform: scale(1.15); }
  }

  /* ── TEXT BLOCK ── */
  .text {
    display: flex;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 0 10px;
    flex: 1;
  }

  .greeting {
    font-size: clamp(1rem, 2.8vw, 1.5rem);
    font-weight: 400;
    white-space: nowrap;
  }

  .greeting strong {
    font-weight: 500;
  }

  .dot {
    font-size: clamp(1rem, 2.8vw, 1.5rem);
    font-weight: 300;
  }

  .meta {
    font-size: clamp(0.85rem, 2.2vw, 1.2rem);
    font-weight: 300;
    white-space: nowrap;
    opacity: 0.85;
  }
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="card">
  <span class="emoji" id="emoji">☀️</span>
  <div class="text">
    <span class="greeting" id="greeting">Good morning, <strong>Miranda</strong></span>
    <span class="dot">·</span>
    <span class="meta" id="meta">Saturday, March 14  ·  10:32 AM</span>
  </div>
</div>

<script>
  const days   = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
  const months = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];

  function update() {
    const now    = new Date();
    const h      = now.getHours();
    const min    = now.getMinutes();
    const ampm   = h >= 12 ? 'PM' : 'AM';
    const h12    = h % 12 || 12;
    const minStr = String(min).padStart(2,'0');

    const day   = days[now.getDay()];
    const month = months[now.getMonth()];
    const date  = now.getDate();

    let emoji, label;
    if (h >= 5 && h < 12)       { emoji = '☀️';  label = 'Good morning'; }
    else if (h >= 12 && h < 20) { emoji = '🌆';  label = 'Good evening'; }
    else                         { emoji = '🌙';  label = 'Good night';   }

    document.getElementById('emoji').textContent   = emoji;
    document.getElementById('greeting').innerHTML  = `${label}, <strong>Miranda</strong>`;
    document.getElementById('meta').textContent    = `${day}, ${month} ${date}  ·  ${h12}:${minStr} ${ampm}`;
  }

  update();
  setInterval(update, 10000);
</script>
</body>
</html>
